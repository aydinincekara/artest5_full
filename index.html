<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>AR Video Deneyimi</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#151515">
    <link rel="apple-touch-icon" href="media_klasoru/uygulama_ikonu.png">

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TZN6MVBK6K"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TZN6MVBK6K');
    </script>

    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "w3dhek8pil");
    </script>

    <style>
        /* Ekranın kenarlarındaki boşlukları sıfırlar ve kaydırmayı kapatır */
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        
        /* Başlangıç Siyah Ekranının Tasarımı */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 15, 15, 0.95); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        
        /* Başlat ve diğer butonların tasarımları */
        button { padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; margin: 5px; }
        #start-btn { background-color: #28a745; color: white; display: none; }
        #loading-text { color: #17a2b8; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Alttaki Sesi Aç - Log Butonlarının kutusu */
        #ui-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; display: none; gap: 10px;
        }
        .action-btn { background-color: rgba(255, 255, 255, 0.9); border-radius: 20px; }

        /* Log tablosunun arka plan penceresi */
        #log-modal { display: none; position: absolute; top: 5%; left: 5%; width: 90%; height: 90%; background: rgba(20,20,20,0.95); z-index: 10000; color: white; padding: 20px; box-sizing: border-box;}
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #555; padding: 10px; text-align: left; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>AR Sistemine Hoş Geldiniz</h2>
        <p>Lütfen cihazınızın sesini açın ve tarayıcınıza kamera erişim izni verin.</p>
        <p id="loading-text">Yükleniyor, Lütfen Bekleyin...</p>
        <button id="start-btn">Sistemi Başlat</button>
    </div>

    <div id="ui-container">
        <button id="audio-btn" class="action-btn">Sesi Aç 🔇</button>
        <button id="open-log-btn" class="action-btn">Logları Gör 📋</button>
    </div>

    <div id="log-modal">
        <button id="close-log-btn" style="background:#dc3545; color:white; float:right;">Kapat X</button>
        <h3>Sistem Değişiklik Logları</h3>
        <table>
            <tr><th>Tarih</th><th>Sürüm</th><th>Notlar</th></tr>
            <tr><td>02.04.2026</td><td>v1.3</td><td>Sistem 4 resim kapasitesine çıkarıldı. Service Worker eklendi.</td></tr>
        </table>
    </div>

    <a-scene mindar-image="imageTargetSrc: media_klasoru/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false">
        
        <a-assets timeout="10000">
            <video id="vid1" src="media_klasoru/video1.mp4" loop crossorigin="anonymous" playsinline muted></video>
            <video id="vid2" src="media_klasoru/video2.mp4" loop crossorigin="anonymous" playsinline muted></video>
            <video id="vid3" src="media_klasoru/video3.mp4" loop crossorigin="anonymous" playsinline muted></video>
            <video id="vid4" src="media_klasoru/video4.mp4" loop crossorigin="anonymous" playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0" class="ar-target" data-video="#vid1">
            <a-video src="#vid1" position="0 0 0" width="1" height="1,44"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1" class="ar-target" data-video="#vid2">
            <a-video src="#vid2" position="0 0 0" width="1" height="0.56"></a-video>
        </a-entity>
        
        <a-entity mindar-image-target="targetIndex: 2" class="ar-target" data-video="#vid3">
            <a-video src="#vid3" position="0 0 0" width="1" height="1,84"></a-video>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 3" class="ar-target" data-video="#vid4">
            <a-video src="#vid4" position="0 0 0" width="1" height="0.56"></a-video>
        </a-entity>

    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // HTML üzerindeki butonları ve arayüzleri koda tanıtıyoruz
            const startBtn = document.getElementById("start-btn");
            const loadingText = document.getElementById("loading-text");
            const sceneEl = document.querySelector('a-scene');
            
            // A-Frame dosyaları yüklediğinde veya 10sn süresi dolduğunda butonu gösterir
            sceneEl.addEventListener('loaded', function () {
                loadingText.style.display = "none"; startBtn.style.display = "block";
            });
            setTimeout(() => { 
                loadingText.style.display = "none"; startBtn.style.display = "block"; 
            }, 10500);

            // Başlat butonuna basılınca kara ekranı gizler ve kamerayı açar
            startBtn.addEventListener('click', function() {
                document.getElementById("start-screen").style.display = "none";
                document.getElementById("ui-container").style.display = "flex";
                sceneEl.systems["mindar-image-system"].start();
            });

            // Ses Açma/Kapatma Mantığı (Tüm videoları bulup seslerini açar/kapatır)
            let isMuted = true;
            document.getElementById("audio-btn").addEventListener('click', function(e) {
                isMuted = !isMuted;
                document.querySelectorAll('video').forEach(v => v.muted = isMuted);
                e.target.innerText = isMuted ? "Sesi Aç 🔇" : "Sesi Kapat 🔊";
            });

            // Log Modalı Aç/Kapat Mantığı
            document.getElementById("open-log-btn").addEventListener('click', () => { document.getElementById("log-modal").style.display = 'block'; });
            document.getElementById("close-log-btn").addEventListener('click', () => { document.getElementById("log-modal").style.display = 'none'; });

            // YAPAY ZEKA GÖRÜNTÜ TANIMA (Tetikleyiciler)
            document.querySelectorAll('.ar-target').forEach(target => {
                const vidId = target.getAttribute('data-video');
                const videoEl = document.querySelector(vidId);

                // Kamerada resim bulununca videoyu oynat
                target.addEventListener("targetFound", () => { if(videoEl) videoEl.play(); });
                // Resim kameradan çıkınca videoyu durdur ve başa sar
                target.addEventListener("targetLost", () => { 
                    if(videoEl) { videoEl.pause(); videoEl.currentTime = 0; }
                });
            });
        });

        // PWA İÇİN ZORUNLU: SERVICE WORKER KAYDI
        // Telefonun bu siteyi bir uygulama olarak algılamasını sağlayan kodu çalıştırır
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
            .then(() => console.log("Service Worker başarıyla yüklendi."))
            .catch((err) => console.log("Service Worker hatası: ", err));
        }
    </script>
</body>
</html>
